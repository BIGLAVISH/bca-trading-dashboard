<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lavish Gemz</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:Arial}
.menu{position:fixed;top:20px;left:20px;background:#987114;color:#fff;border:none;padding:15px;font-size:20px;border-radius:10px}
.sidebar{position:fixed;width:260px;height:100%;background:#000;padding:80px 15px;transition:.3s;overflow:auto}
.sidebar button{display:block;width:100%;margin:8px 0;padding:12px;background:none;border:1px solid #444;color:#fff;border-radius:8px}
.main{margin-left:260px;padding:20px}
.collapsed .sidebar{transform:translateX(-100%)}
.collapsed .main{margin-left:0}

.card{border:1px solid #555;padding:15px;margin:10px 0;border-radius:10px}
.gold{color:#d6a63d}
.up{color:#22c55e}
.down{color:#ef4444}
.pending{color:#d6a63d}
</style>
</head>

<body>

<button class="menu" onclick="toggle()">☰</button>

<div id="app">
<div class="sidebar">
  <button onclick="show('dashboard')">Dashboard</button>
  <button onclick="show('signals')">Signals</button>
  <button onclick="show('trades')">Trades</button>
</div>

<div class="main">

<div id="dashboard">
<h2 class="gold">Dashboard</h2>

<div class="card">Win %: <span id="win">0%</span></div>
<div class="card">Total P/L: <span id="pl">$0</span></div>
<div class="card">Lot Size: <span id="lot">0</span></div>

</div>

<div id="signals" style="display:none">
<h2 class="gold">Signals</h2>

<button onclick="test('BUY')">BUY</button>
<button onclick="test('SELL')">SELL</button>

<table width="100%" id="table"></table>
</div>

<div id="trades" style="display:none">
<h2 class="gold">Trades</h2>
<div id="tradesList"></div>
</div>

</div>
</div>

<script>
let signals = JSON.parse(localStorage.getItem("signals")||"[]");

function toggle(){
  document.getElementById("app").classList.toggle("collapsed");
}

function show(p){
  document.getElementById("dashboard").style.display="none";
  document.getElementById("signals").style.display="none";
  document.getElementById("trades").style.display="none";
  document.getElementById(p).style.display="block";
}

function save(){
  localStorage.setItem("signals",JSON.stringify(signals));
}

function test(type){
  signals.unshift({
    symbol:"EURUSD",
    action:type,
    lot:0.01,
    profit:0,
    result:"OPEN"
  });
  save();
  render();
}

function win(i){
  signals[i].result="WIN";
  signals[i].profit=100;
  save(); render();
}

function loss(i){
  signals[i].result="LOSS";
  signals[i].profit=-50;
  save(); render();
}

function editPL(i){
  let v=prompt("Profit/Loss:",signals[i].profit);
  if(v!==null){signals[i].profit=Number(v);save();render();}
}

function editLot(i){
  let v=prompt("Lot:",signals[i].lot);
  if(v!==null){signals[i].lot=Number(v);save();render();}
}

function render(){
  let t=document.getElementById("table");
  let trades=document.getElementById("tradesList");

  let wins=signals.filter(s=>s.result=="WIN").length;
  let losses=signals.filter(s=>s.result=="LOSS").length;
  let closed=wins+losses;

  let pl=signals.reduce((a,s)=>a+s.profit,0);
  let lot=signals.reduce((a,s)=>a+s.lot,0);

  document.getElementById("win").innerText=closed?Math.round(wins/closed*100)+"%":"0%";
  document.getElementById("pl").innerText="$"+pl;
  document.getElementById("lot").innerText=lot.toFixed(2);

  t.innerHTML=signals.map((s,i)=>`
    <tr>
      <td>${s.symbol}</td>
      <td>${s.action}</td>
      <td>${s.lot}</td>
      <td class="${s.profit>=0?'up':'down'}">$${s.profit}</td>
      <td>${s.result}</td>
      <td>
        <button onclick="win(${i})">WIN</button>
        <button onclick="loss(${i})">LOSS</button>
        <button onclick="editPL(${i})">P/L</button>
        <button onclick="editLot(${i})">LOT</button>
      </td>
    </tr>
  `).join("");

  trades.innerHTML = signals.map(s=>`
    <div class="card">${s.symbol} | ${s.action} | ${s.lot} | $${s.profit}</div>
  `).join("");
}

render();
</script>

</body>
</html>
