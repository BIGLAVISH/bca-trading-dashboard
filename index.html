<!DOCTYPE html>
<html>
<head>
  <title>BCA Trading Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: Arial; background:#0b0f1a; color:#fff; padding:10px }
    .card { background:#111827; padding:10px; margin:10px 0; border-radius:10px }
    .win { color:#22c55e }
    .loss { color:#ef4444 }
  </style>
</head>
<body>

<h2>📊 BCA Trading Dashboard</h2>
<div id="signals"></div>

<script>
async function loadSignals(){
  const res = await fetch("/.netlify/functions/latest");
  const data = await res.json();

  const container = document.getElementById("signals");
  container.innerHTML = "";

  data.forEach(s => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <b>${s.symbol}</b> - ${s.action} <br>
      Price: ${s.price} <br>
      SL: ${s.sl} | TP: ${s.tp} <br>
      Status: <span class="${s.result === 'WIN' ? 'win' : s.result === 'LOSS' ? 'loss' : ''}">
        ${s.result}
      </span>
    `;
    container.appendChild(div);
  });
}

setInterval(loadSignals, 2000);
loadSignals();
</script>

</body>
</html>
