<!DOCTYPE html>
<html>
<head>
  <title>Lavish Gemz Control Center</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;color:#fff;background:#050505}

    /* 🔥 BACKGROUND (ENHANCED) */
    body:before{
      content:"";
      position:fixed;
      inset:0;
      background:url("lavish-gemz.jpg") center/cover no-repeat;
      opacity:.65;
      filter:contrast(1.25) brightness(1.15) saturate(1.1);
      z-index:-2;
    }
    body:after{
      content:"";
      position:fixed;
      inset:0;
      background:linear-gradient(to bottom,rgba(0,0,0,.45),rgba(0,0,0,.75));
      z-index:-1;
    }

    /* ☰ MENU BUTTON */
    .menuBtn{
      position:fixed;top:14px;left:14px;z-index:9999;
      background:#8b650d;color:#fff;border:1px solid #d6a63d;
      border-radius:8px;padding:10px 14px;font-size:20px;cursor:pointer
    }

    .app{display:flex;min-height:100vh}
    aside{
      width:260px;background:rgba(0,0,0,.9);
      border-right:1px solid #8b650d;
      padding:60px 18px 18px;
      position:fixed;height:100vh;overflow:auto;
      transition:.3s ease;
    }

    main{
      margin-left:260px;
      width:calc(100% - 260px);
      padding:24px;
      transition:.3s ease;
    }

    /* COLLAPSE */
    .app.collapsed aside{transform:translateX(-100%)}
    .app.collapsed main{margin-left:0;width:100%}

    .logo{font-size:22px;font-weight:900;color:#d8a83f;margin-bottom:25px}
    .nav button,.goldBtn{
      width:100%;background:transparent;color:#f8e7b1;
      border:1px solid transparent;padding:12px;border-radius:8px;
      margin-bottom:8px;text-align:left;cursor:pointer
    }
    .nav button.active,.nav button:hover,.goldBtn{
      background:#8b650d;color:#fff;border-color:#d6a63d
    }

    .card{
      background:rgba(0,0,0,.75);
      border:1px solid #3d2a0b;
      border-radius:12px;padding:16px;margin-bottom:16px
    }

    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
    .stat{font-size:28px;font-weight:bold;color:#d8a83f}

    table{width:100%;border-collapse:collapse}
    th,td{padding:10px;border-bottom:1px solid #333}

    .tag{padding:4px 8px;border-radius:6px}
    .buy{background:#14532d}
    .sell{background:#7f1d1d}

    .page{display:none}
    .page.active{display:block}

    @media(max-width:900px){
      aside{width:80%}
      main{margin-left:0;width:100%;padding-top:70px}
    }
  </style>
</head>

<body>

<button class="menuBtn" onclick="toggleSidebar()">☰</button>

<div class="app" id="app">

  <!-- SIDEBAR -->
  <aside>
    <div class="logo">LAVISH GEMZ</div>

    <div class="nav">
      <button class="active" onclick="showPage('dashboard',this)">Dashboard</button>
      <button onclick="showPage('signals',this)">Signals</button>
      <button onclick="showPage('trades',this)">Trades</button>
      <button onclick="showPage('bridge',this)">MT4 Bridge</button>
    </div>

    <img src="lavish-gemz.jpg" style="width:100%;margin-top:20px;border-radius:10px">
  </aside>

  <!-- MAIN -->
  <main>

    <section id="dashboard" class="page active">
      <div class="card">
        <h2>Dashboard</h2>
        <div class="grid">
          <div class="card"><p>Total Trades</p><div class="stat" id="totalTrades">0</div></div>
          <div class="card"><p>Wins</p><div class="stat" id="wins">0</div></div>
          <div class="card"><p>Losses</p><div class="stat" id="losses">0</div></div>
          <div class="card"><p>Balance</p><div class="stat" id="balance">$0</div></div>
        </div>
      </div>
    </section>

    <section id="signals" class="page">
      <div class="card">
        <button onclick="sendTest('BUY')">BUY TEST</button>
        <button onclick="sendTest('SELL')">SELL TEST</button>
        <button onclick="clearSignals()">CLEAR</button>
      </div>

      <div class="card">
        <table>
          <thead>
            <tr><th>Symbol</th><th>Action</th><th>Result</th><th>Update</th></tr>
          </thead>
          <tbody id="signalTable"></tbody>
        </table>
      </div>
    </section>

    <section id="trades" class="page">
      <div class="card">
        <h3>Trades</h3>
        <table>
          <tbody id="tradeTable"></tbody>
        </table>
      </div>
    </section>

    <section id="bridge" class="page">
      <div class="card">
        <h3>Webhook</h3>
        <input id="webhookUrl" style="width:100%">
      </div>
    </section>

  </main>
</div>

<script>
let signals = JSON.parse(localStorage.getItem("signals")||"[]");

function toggleSidebar(){
  document.getElementById("app").classList.toggle("collapsed");
}

function showPage(id,btn){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
  if(btn)btn.classList.add("active");
}

function save(){localStorage.setItem("signals",JSON.stringify(signals));}

function render(){
  let wins=signals.filter(s=>s.result==="WIN").length;
  let losses=signals.filter(s=>s.result==="LOSS").length;

  totalTrades.textContent=signals.length;
  document.getElementById("wins").textContent=wins;
  document.getElementById("losses").textContent=losses;

  signalTable.innerHTML=signals.map((s,i)=>`
    <tr>
      <td>${s.symbol}</td>
      <td><span class="tag ${s.action==='BUY'?'buy':'sell'}">${s.action}</span></td>
      <td>${s.result}</td>
      <td>
        <button onclick="mark(${i},'WIN')">WIN</button>
        <button onclick="mark(${i},'LOSS')">LOSS</button>
      </td>
    </tr>
  `).join("");

  tradeTable.innerHTML=signals.map(s=>`
    <tr><td>${s.symbol} ${s.action} ${s.result}</td></tr>
  `).join("");

  webhookUrl.value=location.origin+"/.netlify/functions/webhook";
}

function mark(i,res){
  signals[i].result=res;
  save();
  render();
}

function sendTest(action){
  signals.unshift({symbol:"EURUSD",action,result:"OPEN"});
  save();
  render();
}

function clearSignals(){
  signals=[];
  save();
  render();
}

render();
</script>

</body>
</html>
