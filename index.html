<!DOCTYPE html>
<html>
<head>
  <title>BCA Trading Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { background:#0b0f1a; color:#fff; font-family:Arial; padding:10px }
    .card { background:#111827; padding:10px; margin:10px 0; border-radius:10px }
    .win { color:#22c55e }
    .loss { color:#ef4444 }
    button { margin:5px; padding:5px 10px }
  </style>
</head>
<body>

<h2>📊 BCA Trading Dashboard</h2>

<div id="stats"></div>
<div id="signals">Loading...</div>

<script>
async function load(){
  const res = await fetch("/.netlify/functions/latest");
  const data = await res.json();

  const container = document.getElementById("signals");

  if(!data.length){
    container.innerHTML = "No trades yet...";
    return;
  }

  let wins = 0, losses = 0;

  container.innerHTML = data.map((s,i) => {
    if(s.result === "WIN") wins++;
    if(s.result === "LOSS") losses++;

    return `
      <div class="card">
        <b>${s.symbol}</b> - ${s.action}<br>
        Pattern: ${s.pattern}<br>
        Price: ${s.price}<br>
        SL: ${s.sl} | TP: ${s.tp}<br>

        Status:
        <span class="${s.result === 'WIN' ? 'win' : s.result === 'LOSS' ? 'loss' : ''}">
          ${s.result}
        </span><br>

        <button onclick="update(${i}, 'WIN')">WIN</button>
        <button onclick="update(${i}, 'LOSS')">LOSS</button>
      </div>
    `;
  }).join("");

  document.getElementById("stats").innerHTML =
    `Wins: ${wins} | Losses: ${losses}`;
}

async function update(index, result){
  const res = await fetch("/.netlify/functions/latest");
  let data = await res.json();

  data[index].result = result;

  await fetch("/.netlify/functions/store", {
    method: "POST",
    body: JSON.stringify({ signals: data })
  });

  load();
}

setInterval(load, 2000);
load();
</script>

</body>
</html>
