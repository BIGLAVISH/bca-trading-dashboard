<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BCA Trading Bot Control Center</title><style>
body{margin:0;background:#080b10;color:#e8eef8;font-family:Arial,Helvetica,sans-serif}header{padding:18px 22px;background:#101722;border-bottom:1px solid #233043}.wrap{padding:18px;max-width:1200px;margin:auto}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.card{background:#111923;border:1px solid #253244;border-radius:14px;padding:14px}.big{font-size:28px;font-weight:800}.muted{color:#90a0b8}button,input{background:#0c111a;color:#fff;border:1px solid #334057;border-radius:10px;padding:10px}button{cursor:pointer}table{width:100%;border-collapse:collapse;margin-top:12px}td,th{border-bottom:1px solid #253244;padding:9px;text-align:left;font-size:13px}.buy{color:#2dff8f}.sell{color:#ff5b6e}.close{color:#ffd166}@media(max-width:800px){.grid{grid-template-columns:1fr 1fr}table{font-size:12px}.hide-sm{display:none}}
</style></head><body><header><b>BCA Trading Bot Control Center</b><div class="muted">Netlify + GitHub dashboard • TradingView signals • MT4 relay log</div></header><div class="wrap">
<div class="grid"><div class="card"><div class="muted">Signals</div><div id="total" class="big">0</div></div><div class="card"><div class="muted">BUY</div><div id="buys" class="big buy">0</div></div><div class="card"><div class="muted">SELL</div><div id="sells" class="big sell">0</div></div><div class="card"><div class="muted">Last Signal</div><div id="last" class="big">—</div></div></div>
<div class="card" style="margin-top:14px"><b>Webhook URL</b><p class="muted">Use this in TradingView alert webhook URL:</p><input id="url" style="width:100%" readonly><p><button onclick="copyUrl()">Copy Webhook URL</button> <button onclick="load()">Refresh</button> <button onclick="downloadCsv()">Export CSV</button></p></div>
<div class="card" style="margin-top:14px"><b>Signal History</b><table><thead><tr><th>Time</th><th>Action</th><th>Symbol</th><th class="hide-sm">Price</th><th class="hide-sm">SL</th><th class="hide-sm">TP</th><th>Pattern</th><th>Raw</th></tr></thead><tbody id="rows"></tbody></table></div>
</div><script>
let signals=[];document.getElementById('url').value=location.origin+'/.netlify/functions/webhook';
function cls(a){return a==='BUY'?'buy':a==='SELL'?'sell':'close'}
async function load(){try{let r=await fetch('/.netlify/functions/signals',{cache:'no-store'});signals=await r.json();render()}catch(e){console.log(e)}}
function render(){document.getElementById('total').textContent=signals.length;document.getElementById('buys').textContent=signals.filter(s=>s.action==='BUY').length;document.getElementById('sells').textContent=signals.filter(s=>s.action==='SELL').length;document.getElementById('last').textContent=signals[0]?.action||'—';document.getElementById('rows').innerHTML=signals.map(s=>`<tr><td>${new Date(s.ts).toLocaleString()}</td><td class="${cls(s.action)}"><b>${s.action}</b></td><td>${s.symbol||''}</td><td class="hide-sm">${s.price||''}</td><td class="hide-sm">${s.sl||''}</td><td class="hide-sm">${s.tp||''}</td><td>${s.pattern||''}</td><td>${(s.raw||'').replaceAll('<','&lt;').slice(0,80)}</td></tr>`).join('')}
function copyUrl(){navigator.clipboard.writeText(document.getElementById('url').value)}
function downloadCsv(){let csv='time,action,symbol,price,sl,tp,lot,pattern,rr,raw\n'+signals.map(s=>[s.ts,s.action,s.symbol,s.price,s.sl,s.tp,s.lot,s.pattern,s.rr,(s.raw||'').replaceAll('"','""')].map(x=>'"'+(x||'')+'"').join(',')).join('\n');let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='bca_signals.csv';a.click()}
load();setInterval(load,5000);
</script></body></html>
